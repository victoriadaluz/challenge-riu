<div
  class="search-input flex items-center bg-surface h10 px 4 rounded-lg w-full llg:w-[300px]"
  role="search"
>
  <label for="search-field" class="sr-only">{{ariaLabel()}}</label>
  <svg
    class="search-input__icon shrink-0 mr-2"
    width="16" height="16" viewBox="0 0 16 16"
    fill="none" aria-hidden="true"
    xmlns="http://www.w3.org/2000/svg"
  >
    <circle cx="6.5" cy="6.5" r="4.5" stroke="#343a40" stroke-width="1.2"/>
    <path d="M10.5 10.5L14 14" stroke="#343a40" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
    <input
        id="search-field"
        class="flex-1 bg-transparent outline-none text-base text-body placeholder:text-muted min-w-0"
        type="search"
        [placeholder]="placeholder()"
        [(ngModel)]="query"
        (keyup.enter)="onSearch()"
        />
</div>
