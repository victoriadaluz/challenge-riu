<div
  class="search-input flex items-center bg-surface h10 px 4 rounded-lg w-full llg:w-[300px]"
  role="search"
>
  <label for="search-field" class="sr-only">{{ ariaLabel() }}</label>
  <svg
    class="shrink-0 mr-3"
    width="16"
    height="16"
    viewBox="0 0 16 16"
    fill="none"
    aria-hidden="true"
  >
    <circle cx="7" cy="7" r="5" stroke="#343a40" stroke-width="1.5" />
    <path d="M11 11L14.5 14.5" stroke="#343a40" stroke-width="1.5" stroke-linecap="round" />
  </svg>
  <input
    id="search-field"
    class="flex-1 bg-transparent outline-none text-base text-body placeholder:text-muted min-w-0"
    type="search"
    [placeholder]="placeholder()"
    [(ngModel)]="query"
    (keyup.enter)="onSearch()"
  />
</div>
