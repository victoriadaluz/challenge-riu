<article class="article-card flex flex-col gap-[16px]">
  <figure
    class="article-card__image m-0 w-full aspect-video rounded-lg overflow-hidden bg-neutral flex items-center justify-center"
  >
    @if (articleImageUrl()) {
      <img
        class="w-full h-full object-cover"
        [src]="articleImageUrl()"
        [alt]="articleImageAlt()"
        sizes="(max-width: 1024px) 100vw, 33vw"
        loading="lazy"
        decoding="async"
      />
    } @else {
      <span class="font-bold text-4xl uppercase text-muted" aria-hidden="true">Image</span>
    }
  </figure>

  <div class="article-card__meta flex items-center gap-2">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="3" y="4" width="18" height="17" rx="2" stroke="#343a40" stroke-width="1.5" />
      <path d="M3 9H21" stroke="#343a40" stroke-width="1.5" />
      <path d="M8 2V5M16 2V5" stroke="#343a40" stroke-width="1.5" stroke-linecap="round" />
      <circle cx="8" cy="13" r="1" fill="#343a40" />
      <circle cx="12" cy="13" r="1" fill="#343a40" />
      <circle cx="16" cy="13" r="1" fill="#343a40" />
      <circle cx="8" cy="17" r="1" fill="#343a40" />
      <circle cx="12" cy="17" r="1" fill="#343a40" />
    </svg>
    <time
      class="article-card__date font-bold text-base leading-[25px] text-body"
      [attr.datetime]="articleDateTime()"
    >
      {{ articleDate() }}
    </time>
  </div>
<h3 class="article-card__title m-0 font-bold text-[23px] leading-[25px] text-black lg:text-[30px] lg:leading-[38px]">
  {{ articleTitle() }}
</h3>

  <p class="article-card__description m-0 text-base leading-6 text-body font-normal">
    {{ articleDescription() }}
  </p>
</article>
