<section
  class="featured-article bg-surface py-8 px-5 lg:py-24 lg:px-8"
  aria-label="Featured Article"
>
  <div class="featured-article__container w-full max-w-[1542px] mx-auto">

    <article
      class="featured-article__card
             bg-white rounded-lg lg:overflow-hidden p-8
             shadow-[0px_2px_4px_0px_rgba(0,0,0,0.2)]
             flex flex-col gap-8
             lg:flex-row lg:h-[480px]"
    >

      <!-- Image -->
      <figure
        class="featured-article__image
               m-0 rounded-lg overflow-hidden bg-neutral
               aspect-video w-full shrink-0
               flex items-center justify-center
               lg:flex-1 lg:aspect-auto lg:self-stretch"
      >
        @if (imageUrl()) {
          <img
            class="w-full h-full object-cover"
            [src]="imageUrl()"
            [alt]="imageAlt()"
            sizes="(max-width: 1024px) 100vw, 50vw"
            loading="eager"
            decoding="async"
          />
        } @else {
          <span class="font-bold text-4xl uppercase text-muted" aria-hidden="true">
            Image
          </span>
        }
      </figure>

      <!-- Content -->
      <div
        class="featured-article__content
               flex flex-col gap-4 items-end
               lg:flex-1 lg:gap-6 lg:self-stretch"
      >
      
        <div class="featured-article__body flex flex-col gap-4 w-full">

          <!-- Date -->
          <div class="featured-article__meta flex items-center gap-2">
            <svg
              class="shrink-0"
              width="24" height="24" viewBox="0 0 24 24"
              fill="none" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect x="3" y="4" width="18" height="17" rx="2" stroke="#343a40" stroke-width="1.5"/>
              <path d="M3 9H21" stroke="#343a40" stroke-width="1.5"/>
              <path d="M8 2V5M16 2V5" stroke="#343a40" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="8"  cy="13" r="1" fill="#343a40"/>
              <circle cx="12" cy="13" r="1" fill="#343a40"/>
              <circle cx="16" cy="13" r="1" fill="#343a40"/>
              <circle cx="8"  cy="17" r="1" fill="#343a40"/>
              <circle cx="12" cy="17" r="1" fill="#343a40"/>
            </svg>
            <time
              class="featured-article__date font-bold text-base leading-6 text-body"
              [attr.datetime]="datetime()"
            >
              {{ date() }}
            </time>
          </div>

          <!-- Title -->
          <h2 class="featured-article__title font-bold text-[24px] leading-[28px] text-body">
            {{ title() }}
          </h2>

          <!-- Description -->
          <p class="featured-article__description text-base leading-6 text-body">
            {{ description() }}
          </p>

        </div>
        <button
          class="featured-article__cta
                 inline-flex items-center justify-center
                 h-10 px-2 rounded-lg
                 bg-primary text-white
                 font-bold text-base leading-6
                 cursor-pointer transition-opacity hover:opacity-90"
          type="button"
          [attr.aria-label]="ctaLabel()"
        >
          {{ ctaLabel() }}
        </button>

      </div>
    </article>

  </div>
</section>
